<!--
  Paradocs PWA app icon — V10.1 rebrand
  Black bg (#0a0a14) + purple Changa ExtraBold "P" (#a855f7).
  Matches the splash-screen aesthetic for visual coherence
  between launch and home-screen. PNG renders at every required
  size live alongside this file; regenerate with
  outputs/build_icons.py if you change this source.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0a0a14"/>
  <text
    x="256"
    y="256"
    fill="#a855f7"
    font-family="Changa, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="380"
    text-anchor="middle"
    dominant-baseline="central"
  >P</text>
</svg>
